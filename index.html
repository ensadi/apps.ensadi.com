<!DOCTYPE html>
<html>
  <head>
    <title>Ensadi Apps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        background-color: #2D357D;
        margin: 0;
        padding: 0;
      }

      .icon-link {
        display: inline-block;
        margin: 10px;
        width: calc(25% - 20px);
        text-align: center;
      }

      .icon-link img {
        max-width: 100%;
      }

      @media screen and (max-width: 768px) {
        .icon-link {
          width: calc(50% - 20px);
        }
      }
    </style>
  </head>
  <body>
    <div class="icon-link">
      <a href="https://calc.ensadi.com">
        <img src="calcicon.png" alt="Calculator" />
      </a>
    </div>
    <div class="icon-link">
      <a href="https://stitchkit.ensadi.com">
        <img src="stitchkiticon.png" alt="StitchKit" />
      </a>
    </div>
    <div class="icon-link">
      <a href="https://foods.ensadi.com">
        <img src="foodsicon.png" alt="Foods" />
      </a>
    </div>
  </body>
</html>
