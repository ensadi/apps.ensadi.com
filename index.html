<!DOCTYPE html>
<html>
  <head>
    <title>Ensadi Apps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        color-scheme: dark;
        color: #eef2ff;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: #1b2642;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 32px 24px 48px;
        background: radial-gradient(circle at top left, rgba(94, 147, 255, 0.22), transparent 28%),
                    radial-gradient(circle at bottom right, rgba(83, 255, 197, 0.16), transparent 25%),
                    linear-gradient(180deg, #1b2642 0%, #121b37 100%);
      }

      .page-shell {
        width: min(1100px, 100%);
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      header h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.04em;
      }

      header p {
        margin: 0.75rem auto 0;
        max-width: 600px;
        color: #cbd5ff;
        font-size: 1rem;
        line-height: 1.6;
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 20px;
      }

      .icon-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 18px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
        transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        text-decoration: none;
      }

      .icon-link:hover,
      .icon-link:focus-within {
        transform: translateY(-6px) scale(1.02);
        border-color: rgba(94, 147, 255, 0.58);
        background: rgba(255, 255, 255, 0.12);
      }

      .icon-link img {
        width: 110px;
        height: 110px;
        object-fit: contain;
        margin-bottom: 1rem;
      }

      .icon-label {
        margin: 0;
        color: #f5f6ff;
        font-weight: 700;
        letter-spacing: 0.015em;
      }

      footer {
        margin-top: 2rem;
        font-size: 0.9rem;
        color: #c6d2ec;
        text-align: center;
      }

      footer a {
        color: inherit;
        text-decoration: underline;
      }

      @media screen and (max-width: 768px) {
        body {
          padding: 16px;
        }

        .page-shell {
          padding: 0 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>Ensadi Apps</h1>
        <p>A small suite of tools in one place</p>
      </header>
      <div class="icon-grid">
        <a class="icon-link" href="https://calc.ensadi.com">
          <img src="calcicon.png" alt="Calculator" />
          <p class="icon-label">Calculator</p>
        </a>
        <a class="icon-link" href="https://stitchkit.ensadi.com">
          <img src="stitchkiticon.png" alt="StitchKit" />
          <p class="icon-label">StitchKit</p>
        </a>
        <a class="icon-link" href="https://foods.ensadi.com">
          <img src="foodsicon.png" alt="Foods" />
          <p class="icon-label">Foods</p>
        </a>
      </div>
      <footer>
        <hr style="border-color: rgba(255,255,255,0.1); margin: 2rem 0 1rem;">
        <div>Copyright &copy; 2024-2026 <a title="https://ensadi.com" href="https://ensadi.com" target="_blank" rel="noreferrer noopener">Ensadi LLC</a></div>
      </footer>
    </div>
  </body>
</html>
